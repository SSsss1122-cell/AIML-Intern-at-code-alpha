<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ResumeAI Pro — AI is analyzing your resume. Please wait.">
    <meta name="theme-color" content="#050816">
    <title>Analyzing Resume — ResumeAI Pro</title>

    <!-- Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/loading.css') }}">

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/loading.js') }}" defer></script>
</head>
<body class="loading-body">
    <!-- ============================================ -->
    <!-- AMBIENT BACKGROUND DECORATION                -->
    <!-- ============================================ -->
    <div class="bg-ambient" aria-hidden="true">
        <div class="bg-blob bg-blob--primary"></div>
        <div class="bg-blob bg-blob--accent"></div>
        <div class="bg-blob bg-blob--subtle"></div>
        <div class="bg-grid"></div>
    </div>

    <!-- ============================================ -->
    <!-- MAIN LOADING CONTAINER                       -->
    <!-- ============================================ -->
    <main class="loading-container" role="main" aria-label="AI Analysis Loading Screen">
        <div class="loading-card">

            <!-- ===================================== -->
            <!-- TOP: BRAND & HEADER                    -->
            <!-- ===================================== -->
            <header class="loading-header">
                <div class="brand-logo-wrapper">
                    <svg
                        class="brand-logo-icon"
                        viewBox="0 0 36 36"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                        aria-hidden="true"
                    >
                        <defs>
                            <linearGradient id="logoGrad" x1="4" y1="4" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#2563EB"/>
                                <stop offset="0.5" stop-color="#60A5FA"/>
                                <stop offset="1" stop-color="#818CF8"/>
                            </linearGradient>
                            <filter id="logoGlowLoading">
                                <feGaussianBlur stdDeviation="1.8" result="blur"/>
                                <feMerge>
                                    <feMergeNode in="blur"/>
                                    <feMergeNode in="SourceGraphic"/>
                                </feMerge>
                            </filter>
                        </defs>
                        <path
                            d="M18 4L22.5 13.5L32 16L24 23.5L25.5 33L18 28L10.5 33L12 23.5L4 16L13.5 13.5L18 4Z"
                            fill="url(#logoGrad)"
                            filter="url(#logoGlowLoading)"
                            stroke="none"
                        />
                        <circle cx="18" cy="18" r="5" fill="#050816" opacity="0.6"/>
                        <circle cx="18" cy="18" r="2.2" fill="url(#logoGrad)"/>
                    </svg>
                </div>
                <h1 class="loading-app-name">
                    ResumeAI <span class="highlight">Pro</span>
                </h1>
                <p class="loading-subtitle">
                    Please wait while our AI analyzes your resume
                </p>
            </header>

            <!-- ===================================== -->
            <!-- CENTER: AI SCANNER / BRAIN ANIMATION   -->
            <!-- ===================================== -->
            <section class="scanner-section" aria-label="AI Scanner Visualization">
                <div class="scanner-core">
                    <!-- Pulsing outer ring -->
                    <div class="scanner-ring scanner-ring--outer"></div>
                    <div class="scanner-ring scanner-ring--middle"></div>
                    <div class="scanner-ring scanner-ring--inner"></div>

                    <!-- Rotating gradient circle -->
                    <div class="rotating-circle">
                        <svg viewBox="0 0 160 160" class="rotating-svg" aria-hidden="true">
                            <defs>
                                <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#2563EB" stop-opacity="0.8"/>
                                    <stop offset="50%" stop-color="#60A5FA" stop-opacity="0.4"/>
                                    <stop offset="100%" stop-color="#818CF8" stop-opacity="0.8"/>
                                </linearGradient>
                            </defs>
                            <circle
                                cx="80" cy="80" r="70"
                                fill="none"
                                stroke="url(#circleGrad)"
                                stroke-width="3"
                                stroke-linecap="round"
                                stroke-dasharray="200 440"
                                stroke-dashoffset="0"
                            />
                        </svg>
                    </div>

                    <!-- AI Brain icon -->
                    <div class="brain-icon-wrapper">
                        <svg
                            class="brain-icon"
                            viewBox="0 0 48 48"
                            fill="none"
                            xmlns="http://www.w3.org/2000/svg"
                            aria-hidden="true"
                        >
                            <path
                                d="M24 6C17.3726 6 12 11.3726 12 18C12 18.8986 12.0986 19.7751 12.2843 20.6202C8.97627 21.9467 6 25.5724 6 30C6 34.4183 9.58172 38 14 38H34C38.4183 38 42 34.4183 42 30C42 25.5724 39.0237 21.9467 35.7157 20.6202C35.9014 19.7751 36 18.8986 36 18C36 11.3726 30.6274 6 24 6Z"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linejoin="round"
                            />
                            <circle cx="18" cy="18" r="3" fill="currentColor" opacity="0.6"/>
                            <circle cx="30" cy="18" r="3" fill="currentColor" opacity="0.6"/>
                            <path
                                d="M16 26C16 24.8954 17.7909 24 20 24H28C30.2091 24 32 24.8954 32 26V28C32 29.1046 30.2091 30 28 30H20C17.7909 30 16 29.1046 16 28V26Z"
                                fill="currentColor"
                                opacity="0.4"
                            />
                        </svg>
                    </div>

                    <!-- Floating particles (generated by JS, but placeholders for CSS) -->
                    <div class="particle-container" aria-hidden="true">
                        <div class="particle particle-1"></div>
                        <div class="particle particle-2"></div>
                        <div class="particle particle-3"></div>
                        <div class="particle particle-4"></div>
                        <div class="particle particle-5"></div>
                        <div class="particle particle-6"></div>
                    </div>
                </div>
            </section>

            <!-- ===================================== -->
            <!-- DYNAMIC STATUS MESSAGE                -->
            <!-- ===================================== -->
            <div class="status-text" id="statusMessage" aria-live="polite">
                <span class="status-icon">
                    <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                        <circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
                        <path d="M10 5V10L13 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
                <span class="status-content">Initializing AI engine...</span>
            </div>

            <!-- ===================================== -->
            <!-- PROGRESS BAR                          -->
            <!-- ===================================== -->
            <div class="progress-container" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" role="progressbar">
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill" style="--progress: 0%;"></div>
                </div>
                <span class="progress-percentage" id="progressPercentage">0%</span>
            </div>

            <!-- ===================================== -->
            <!-- LIVE METRICS CARDS                    -->
            <!-- ===================================== -->
            <section class="metrics-grid" aria-label="Live Analysis Metrics">
                <article class="metric-card" id="metricResumeParsed">
                    <div class="metric-icon">
                        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <rect x="3" y="1" width="14" height="18" rx="2.5" stroke="currentColor" stroke-width="1.6"/>
                            <line x1="6" y1="6" x2="14" y2="6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                            <line x1="6" y1="9" x2="14" y2="9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                            <line x1="6" y1="12" x2="11" y2="12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="metric-label">Resume Parsed</div>
                    <div class="metric-value" id="valueResumeParsed">—</div>
                </article>

                <article class="metric-card" id="metricSkillsFound">
                    <div class="metric-icon">
                        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <path d="M10 2L12.5 7.5L18 9L14 13.5L15 19L10 16L5 19L6 13.5L2 9L7.5 7.5L10 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="metric-label">Skills Found</div>
                    <div class="metric-value" id="valueSkillsFound">—</div>
                </article>

                <article class="metric-card" id="metricKeywordsMatched">
                    <div class="metric-icon">
                        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <rect x="2" y="3" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
                            <line x1="6" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                            <line x1="6" y1="12" x2="10" y2="12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="metric-label">Keywords Matched</div>
                    <div class="metric-value" id="valueKeywordsMatched">—</div>
                </article>

                <article class="metric-card" id="metricATSScore">
                    <div class="metric-icon">
                        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M10 5V10L13.5 13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="metric-label">ATS Score Prediction</div>
                    <div class="metric-value" id="valueATSScore">—</div>
                </article>

                <article class="metric-card metric-card--confidence" id="metricAIConfidence">
                    <div class="metric-icon">
                        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <path d="M10 2L12.5 7.5L18 9L14 13.5L15 19L10 16L5 19L6 13.5L2 9L7.5 7.5L10 2Z" fill="currentColor" opacity="0.3"/>
                            <path d="M10 4L11.8 8.2L16 10L11.8 11.8L10 16L8.2 11.8L4 10L8.2 8.2L10 4Z" fill="currentColor" stroke="none"/>
                        </svg>
                    </div>
                    <div class="metric-label">AI Confidence</div>
                    <div class="metric-value" id="valueAIConfidence">—</div>
                </article>
            </section>

            <!-- ===================================== -->
            <!-- BOTTOM: TIME ESTIMATE & SPINNER       -->
            <!-- ===================================== -->
            <footer class="loading-footer">
                <div class="footer-spinner" aria-hidden="true">
                    <svg class="spinner-icon" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" opacity="0.2"/>
                        <path d="M12 2C6.47715 2 2 6.47715 2 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <p class="footer-text">This usually takes less than 10 seconds</p>
            </footer>

            <!-- Inside loading.html, after the footer -->
<div id="errorContainer" class="error-container" style="display:none;">
    <p id="errorMessage"></p>
    <button id="retryBtn" class="btn btn--primary">Retry</button>
</div>
        </div>
    </main>

    <!-- ============================================ -->
    <!-- HIDDEN LOADING COMPLETION REDIRECT           -->
    <!-- (Handled by JS after analysis finishes)      -->
    <!-- ============================================ -->
    <div id="completionRedirect" hidden></div>
</body>
</html>
